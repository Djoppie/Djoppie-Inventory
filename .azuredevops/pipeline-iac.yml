trigger:
  branches: { include: [ develop ] }
  paths:    { include: [ infra/*, .azuredevops/pipeline-iac.yml ] }

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'AzureServiceConnectionName'   # <-- maak deze service connection aan (ARM)
  location: 'westeurope'
  parametersFile: 'infra/parameters-dev.json'
  resourceGroup: ''  # RG wordt in Bicep gedefinieerd; we lezen 'm later uit Azure

stages:
- stage: Deploy_IaC
  displayName: 'Deploy IaC (Bicep @ subscription scope)'
  jobs:
  - job: BicepDeploy
    steps:
    - task: AzureCLI@2
      displayName: 'Create/Update infra (subscription deployment)'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e

          # Parse some params for visibility
          LOCATION=$(jq -r '.parameters.location.value' $(parametersFile))
          echo "Using location: $LOCATION"

          # Required secure params from pipeline variables
          if [ -z "$SQL_ADMIN_PASSWORD" ] || [ -z "$ENTRA_BACKEND_CLIENT_SECRET" ]; then
            echo "ERROR: Missing secure variables SQL_ADMIN_PASSWORD and/or ENTRA_BACKEND_CLIENT_SECRET"
            exit 1
          fi

          # Deploy at subscription scope
          az deployment sub create \
            -l $LOCATION \
            -f infra/infrastructure-minimal.bicep \
            -p @$(parametersFile) \
            -p sqlAdminPassword="$(SQL_ADMIN_PASSWORD)" \
               entraBackendClientSecret="$(ENTRA_BACKEND_CLIENT_SECRET)"

          echo "Deployment completed."

          # Discover resource group name from template convention (or list by name pattern)
          RG_NAME=$(az group list --query "[?starts_with(name, 'rg-djoppie-inv-dev-')].name | [0]" -o tsv)
          echo "##vso[task.setvariable variable=RG_NAME;isOutput=true]$RG_NAME"
          echo "RG: $RG_NAME"

          # Get SWA hostname & WebApp name and set CORS automatically
          SWA_HOST=$(az staticwebapp list -g "$RG_NAME" --query "[0].defaultHostname" -o tsv)
          APP_NAME=$(az webapp list -g "$RG_NAME" --query "[0].name" -o tsv)

          if [ -n "$SWA_HOST" ] && [ -n "$APP_NAME" ]; then
            echo "Adding CORS origin: https://$SWA_HOST to WebApp: $APP_NAME"
            az webapp cors add -g "$RG_NAME" -n "$APP_NAME" --allowed-origins "https://$SWA_HOST" >/dev/null
            echo "CORS configured."
          else
            echo "WARNING: Could not determine SWA host or App name. Configure CORS manually later."
          fi

          # Show SWA deployment token for first-time setup (copy to frontend pipeline secret)
          SWA_NAME=$(az staticwebapp list -g "$RG_NAME" --query "[0].name" -o tsv)
          if [ -n "$SWA_NAME" ]; then
            TOKEN=$(az staticwebapp secrets list -g "$RG_NAME" -n "$SWA_NAME" --query "properties.apiKey" -o tsv)
            echo "Static Web App deployment token (copy to Frontend pipeline secret variable 'deployment_token'):"
            echo "$TOKEN"
          fi
      env:
        SQL_ADMIN_PASSWORD: $(sqlAdminPassword)                 # secret pipeline variable
        ENTRA_BACKEND_CLIENT_SECRET: $(entraBackendClientSecret) # secret pipeline variable