# ============================================================================
# DJOPPIE INVENTORY - SINGLE DEV ENVIRONMENT CI/CD PIPELINE
# ============================================================================
# Purpose: Complete automated deployment pipeline for DEV environment
# Source: GitHub repository (https://github.com/Djoppie/Djoppie-Inventory)
# Target: Azure DEV environment (rg-djoppie-inv-dev)
#
# Stages:
#   1. Build Backend (ASP.NET Core 8.0)
#   2. Build Frontend (React + Vite)
#   3. Deploy Infrastructure (Bicep)
#   4. Deploy Backend API
#   5. Run Database Migrations
#   6. Deploy Frontend App
#   7. Smoke Tests & Verification
# ============================================================================

name: $(Date:yyyyMMdd)$(Rev:.r)

# Trigger on develop branch only
trigger:
  branches:
    include:
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'
      - '.github/**'

# Don't trigger on pull requests
pr: none

# Use Ubuntu for faster builds and lower cost
pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES
# ============================================================================

variables:
  # Build configuration
  buildConfiguration: 'Release'
  dotnetSdkVersion: '8.x'
  nodeVersion: '20.x'

  # Project paths
  backendPath: 'src/backend'
  frontendPath: 'src/frontend'
  infrastructurePath: 'infrastructure'

  # Azure configuration (DEV only)
  environment: 'dev'
  azureSubscription: 'Azure-Djoppie-Inventory-Service-Connection'  # Update with your service connection name
  resourceGroupName: 'rg-djoppie-inv-dev'
  location: 'westeurope'

  # Deployment settings
  bicepFile: 'infrastructure/main-minimal.bicep'
  parametersFile: 'infra/parameters-dev.json'

# ============================================================================
# STAGES
# ============================================================================

stages:

# ----------------------------------------------------------------------------
# STAGE 1: BUILD BACKEND
# ----------------------------------------------------------------------------
- stage: BuildBackend
  displayName: 'Build Backend API'
  jobs:

  - job: Build
    displayName: 'Build ASP.NET Core 8.0'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK $(dotnetSdkVersion)'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetSdkVersion)'
        installationPath: $(Agent.ToolsDirectory)/dotnet

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(backendPath)/**/*.csproj'
        feedsToUse: 'select'

    - task: DotNetCoreCLI@2
      displayName: 'Build backend solution'
      inputs:
        command: 'build'
        projects: '$(backendPath)/DjoppieInventory.API/DjoppieInventory.API.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: 'test'
        projects: '$(backendPath)/DjoppieInventory.Tests/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
      continueOnError: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish backend API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(backendPath)/DjoppieInventory.API/DjoppieInventory.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/backend --no-restore'
        zipAfterPublish: true
        modifyOutputPath: false

    - task: PublishBuildArtifacts@1
      displayName: 'Publish backend artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/backend'
        ArtifactName: 'backend'
        publishLocation: 'Container'

# ----------------------------------------------------------------------------
# STAGE 2: BUILD FRONTEND
# ----------------------------------------------------------------------------
- stage: BuildFrontend
  displayName: 'Build Frontend App'
  jobs:

  - job: Build
    displayName: 'Build React + Vite'
    steps:

    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd $(frontendPath)
        npm ci --prefer-offline --no-audit
      displayName: 'Install npm dependencies'

    - script: |
        cd $(frontendPath)
        npm run build
      displayName: 'Build React app with Vite'
      env:
        VITE_API_URL: 'https://placeholder.azurewebsites.net'
        VITE_ENTRA_CLIENT_ID: 'placeholder'
        VITE_ENTRA_TENANT_ID: 'placeholder'
        VITE_ENVIRONMENT: '$(environment)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish frontend artifact'
      inputs:
        PathtoPublish: '$(frontendPath)/dist'
        ArtifactName: 'frontend'
        publishLocation: 'Container'

# ----------------------------------------------------------------------------
# STAGE 3: DEPLOY INFRASTRUCTURE
# ----------------------------------------------------------------------------
- stage: DeployInfrastructure
  displayName: 'Deploy Infrastructure (Bicep)'
  dependsOn: []  # Run in parallel with build stages
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:

  - deployment: DeployBicep
    displayName: 'Deploy Azure Resources'
    environment: 'djoppie-dev-infrastructure'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            displayName: 'Checkout source code'

          - task: AzureCLI@2
            displayName: 'Validate Bicep template'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "======================================"
                echo "Validating Bicep Template"
                echo "======================================"
                echo "Template: $(bicepFile)"
                echo "Location: $(location)"
                echo ""

                # Validate the deployment
                az deployment sub validate \
                  --location $(location) \
                  --template-file $(bicepFile) \
                  --parameters environment='dev' \
                               location='$(location)' \
                               sqlAdminLogin='$(SQL_ADMIN_USERNAME)' \
                               sqlAdminPassword='$(SQL_ADMIN_PASSWORD)' \
                               entraIdTenantId='$(ENTRA_TENANT_ID)' \
                               deploymentPrincipalObjectId='$(DEPLOYMENT_PRINCIPAL_OBJECT_ID)' \
                  --output table

                echo "✓ Template validation successful"

          - task: AzureCLI@2
            displayName: 'Deploy infrastructure to Azure'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "======================================"
                echo "Deploying Infrastructure"
                echo "======================================"
                echo "Environment: $(environment)"
                echo "Location: $(location)"
                echo "Build: $(Build.BuildNumber)"
                echo "======================================"
                echo ""

                # Deploy the infrastructure
                DEPLOYMENT_NAME="djoppie-dev-$(Build.BuildNumber)"

                az deployment sub create \
                  --name "$DEPLOYMENT_NAME" \
                  --location $(location) \
                  --template-file $(bicepFile) \
                  --parameters environment='dev' \
                               location='$(location)' \
                               sqlAdminLogin='$(SQL_ADMIN_USERNAME)' \
                               sqlAdminPassword='$(SQL_ADMIN_PASSWORD)' \
                               entraIdTenantId='$(ENTRA_TENANT_ID)' \
                               deploymentPrincipalObjectId='$(DEPLOYMENT_PRINCIPAL_OBJECT_ID)' \
                  --output json > deployment-output.json

                echo ""
                echo "✓ Infrastructure deployment completed"
                echo ""

                # Display deployment outputs
                echo "======================================"
                echo "Deployment Outputs:"
                echo "======================================"
                cat deployment-output.json | jq -r '.properties.outputs | to_entries[] | "\(.key): \(.value.value)"'
                echo "======================================"
            name: 'deployInfra'

          - task: AzureCLI@2
            displayName: 'Extract deployment outputs'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Extracting deployment outputs..."

                DEPLOYMENT_NAME="djoppie-dev-$(Build.BuildNumber)"

                # Extract outputs using Azure CLI
                RESOURCE_GROUP=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.resourceGroupName.value' -o tsv)
                SQL_SERVER=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.sqlServerName.value' -o tsv)
                SQL_DATABASE=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.sqlDatabaseName.value' -o tsv)
                SQL_SERVER_FQDN=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.sqlServerFqdn.value' -o tsv)
                APP_SERVICE=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.backendAppServiceName.value' -o tsv)
                APP_SERVICE_URL=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.backendAppServiceUrl.value' -o tsv)
                STATIC_WEB_APP=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.frontendStaticWebAppName.value' -o tsv)
                STATIC_WEB_APP_URL=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.frontendStaticWebAppUrl.value' -o tsv)
                KEY_VAULT=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.keyVaultName.value' -o tsv)
                APPINSIGHTS_CONN=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query 'properties.outputs.applicationInsightsConnectionString.value' -o tsv)

                # Validate critical outputs
                if [ -z "$APP_SERVICE" ] || [ -z "$STATIC_WEB_APP" ]; then
                  echo "ERROR: Failed to retrieve critical deployment outputs"
                  exit 1
                fi

                # Set pipeline variables for subsequent stages
                echo "##vso[task.setvariable variable=resourceGroupName;isOutput=true]$RESOURCE_GROUP"
                echo "##vso[task.setvariable variable=sqlServerName;isOutput=true]$SQL_SERVER"
                echo "##vso[task.setvariable variable=sqlDatabaseName;isOutput=true]$SQL_DATABASE"
                echo "##vso[task.setvariable variable=sqlServerFqdn;isOutput=true]$SQL_SERVER_FQDN"
                echo "##vso[task.setvariable variable=appServiceName;isOutput=true]$APP_SERVICE"
                echo "##vso[task.setvariable variable=appServiceUrl;isOutput=true]$APP_SERVICE_URL"
                echo "##vso[task.setvariable variable=staticWebAppName;isOutput=true]$STATIC_WEB_APP"
                echo "##vso[task.setvariable variable=staticWebAppUrl;isOutput=true]$STATIC_WEB_APP_URL"
                echo "##vso[task.setvariable variable=keyVaultName;isOutput=true]$KEY_VAULT"

                echo ""
                echo "✓ Outputs extracted successfully"
            name: 'outputs'

# ----------------------------------------------------------------------------
# STAGE 4: DEPLOY BACKEND API
# ----------------------------------------------------------------------------
- stage: DeployBackend
  displayName: 'Deploy Backend API'
  dependsOn:
    - BuildBackend
    - DeployInfrastructure
  condition: succeeded()
  variables:
    resourceGroupName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.resourceGroupName'] ]
    appServiceName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.appServiceName'] ]
    sqlServerFqdn: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.sqlServerFqdn'] ]
    keyVaultName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.keyVaultName'] ]
  jobs:

  - deployment: DeployAPI
    displayName: 'Deploy ASP.NET Core API'
    environment: 'djoppie-dev-backend'
    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: backend
            displayName: 'Download backend artifact'

          - task: AzureWebApp@1
            displayName: 'Deploy to App Service'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appServiceName)'
              package: '$(Pipeline.Workspace)/backend/*.zip'
              runtimeStack: 'DOTNETCORE|8.0'

          - task: AzureCLI@2
            displayName: 'Health check API'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Waiting for API to start (60 seconds)..."
                sleep 60

                API_URL="https://$(appServiceName).azurewebsites.net"

                echo "Testing health endpoint: $API_URL/health"

                for i in {1..10}; do
                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")

                  if [ "$HTTP_CODE" = "200" ]; then
                    echo "✓ Backend API is healthy (HTTP $HTTP_CODE)"
                    echo "✓ Swagger UI: $API_URL/swagger"
                    exit 0
                  fi

                  echo "Attempt $i/10: HTTP $HTTP_CODE - waiting 10s..."
                  sleep 10
                done

                echo "⚠ Health check timed out, but deployment completed"
                echo "Check logs: az webapp log tail --name $(appServiceName) --resource-group $(resourceGroupName)"

# ----------------------------------------------------------------------------
# STAGE 5: RUN DATABASE MIGRATIONS
# ----------------------------------------------------------------------------
- stage: DatabaseMigrations
  displayName: 'Run Database Migrations'
  dependsOn:
    - BuildBackend
    - DeployInfrastructure
  condition: succeeded()
  variables:
    keyVaultName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.keyVaultName'] ]
  jobs:

  - job: Migrate
    displayName: 'Apply EF Core Migrations'
    steps:

    - checkout: self
      displayName: 'Checkout source code'

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetSdkVersion)'

    - task: AzureCLI@2
      displayName: 'Run Entity Framework migrations'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Installing EF Core tools..."
          dotnet tool install --global dotnet-ef --version 8.*
          export PATH="$PATH:$HOME/.dotnet/tools"

          echo "Retrieving SQL connection string from Key Vault..."
          CONNECTION_STRING=$(az keyvault secret show \
            --vault-name $(keyVaultName) \
            --name "SqlConnectionString" \
            --query "value" -o tsv)

          if [ -z "$CONNECTION_STRING" ]; then
            echo "ERROR: Failed to retrieve connection string"
            exit 1
          fi

          echo "Running migrations..."
          cd $(backendPath)

          dotnet ef database update \
            --project DjoppieInventory.Infrastructure/DjoppieInventory.Infrastructure.csproj \
            --startup-project DjoppieInventory.API/DjoppieInventory.API.csproj \
            --connection "$CONNECTION_STRING" \
            --verbose

          echo "✓ Database migrations completed"
      continueOnError: false

# ----------------------------------------------------------------------------
# STAGE 6: DEPLOY FRONTEND
# ----------------------------------------------------------------------------
- stage: DeployFrontend
  displayName: 'Deploy Frontend App'
  dependsOn:
    - BuildFrontend
    - DeployInfrastructure
    - DeployBackend  # Wait for backend to be ready
  condition: succeeded()
  variables:
    resourceGroupName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.resourceGroupName'] ]
    staticWebAppName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.staticWebAppName'] ]
  jobs:

  - deployment: DeploySPA
    displayName: 'Deploy React SPA to Static Web App'
    environment: 'djoppie-dev-frontend'
    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: frontend
            displayName: 'Download frontend artifact'

          - task: AzureCLI@2
            displayName: 'Get Static Web App deployment token'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Retrieving deployment token..."

                TOKEN=$(az staticwebapp secrets list \
                  --name $(staticWebAppName) \
                  --resource-group $(resourceGroupName) \
                  --query "properties.apiKey" -o tsv)

                if [ -z "$TOKEN" ]; then
                  echo "ERROR: Failed to retrieve deployment token"
                  exit 1
                fi

                echo "✓ Deployment token retrieved"
                echo "##vso[task.setvariable variable=DEPLOYMENT_TOKEN;issecret=true]$TOKEN"

          - task: AzureStaticWebApp@0
            displayName: 'Deploy to Static Web App'
            inputs:
              app_location: '/'
              api_location: ''
              output_location: ''
              azure_static_web_apps_api_token: '$(DEPLOYMENT_TOKEN)'
              skip_app_build: true
              workingDirectory: '$(Pipeline.Workspace)/frontend'

# ----------------------------------------------------------------------------
# STAGE 7: SMOKE TESTS & VERIFICATION
# ----------------------------------------------------------------------------
- stage: SmokeTests
  displayName: 'Smoke Tests & Verification'
  dependsOn:
    - DeployBackend
    - DeployFrontend
    - DatabaseMigrations
  condition: succeeded()
  variables:
    appServiceName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.appServiceName'] ]
    appServiceUrl: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.appServiceUrl'] ]
    staticWebAppName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.staticWebAppName'] ]
    staticWebAppUrl: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.staticWebAppUrl'] ]
  jobs:

  - job: Verify
    displayName: 'Verify Deployment'
    steps:

    - task: PowerShell@2
      displayName: 'Test backend endpoints'
      inputs:
        targetType: 'inline'
        script: |
          $apiUrl = "$(appServiceUrl)"

          Write-Host "======================================"
          Write-Host "Testing Backend API"
          Write-Host "======================================"
          Write-Host "API URL: $apiUrl"
          Write-Host ""

          # Test health endpoint
          try {
            $response = Invoke-WebRequest -Uri "$apiUrl/health" -Method Get -UseBasicParsing
            Write-Host "✓ Health endpoint: $($response.StatusCode)" -ForegroundColor Green
          }
          catch {
            Write-Host "⚠ Health endpoint: $($_.Exception.Message)" -ForegroundColor Yellow
          }

          # Test Swagger
          try {
            $response = Invoke-WebRequest -Uri "$apiUrl/swagger/index.html" -Method Get -UseBasicParsing
            Write-Host "✓ Swagger UI: $($response.StatusCode)" -ForegroundColor Green
          }
          catch {
            Write-Host "⚠ Swagger UI: $($_.Exception.Message)" -ForegroundColor Yellow
          }

    - task: PowerShell@2
      displayName: 'Test frontend'
      inputs:
        targetType: 'inline'
        script: |
          $frontendUrl = "$(staticWebAppUrl)"

          Write-Host "======================================"
          Write-Host "Testing Frontend App"
          Write-Host "======================================"
          Write-Host "Frontend URL: $frontendUrl"
          Write-Host ""

          try {
            $response = Invoke-WebRequest -Uri $frontendUrl -Method Get -UseBasicParsing
            Write-Host "✓ Frontend: $($response.StatusCode)" -ForegroundColor Green
          }
          catch {
            Write-Host "⚠ Frontend: $($_.Exception.Message)" -ForegroundColor Yellow
          }

    - task: PowerShell@2
      displayName: 'Deployment summary'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host ""
          Write-Host "============================================================================" -ForegroundColor Green
          Write-Host " DEPLOYMENT COMPLETED SUCCESSFULLY!" -ForegroundColor Green
          Write-Host "============================================================================" -ForegroundColor Green
          Write-Host ""
          Write-Host "Environment:        dev" -ForegroundColor Cyan
          Write-Host "Build Number:       $(Build.BuildNumber)" -ForegroundColor Cyan
          Write-Host "Build Date:         $(Build.SourceVersion)" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Backend API:" -ForegroundColor Yellow
          Write-Host "  URL:              $(appServiceUrl)" -ForegroundColor White
          Write-Host "  Swagger:          $(appServiceUrl)/swagger" -ForegroundColor White
          Write-Host "  Health:           $(appServiceUrl)/health" -ForegroundColor White
          Write-Host ""
          Write-Host "Frontend App:" -ForegroundColor Yellow
          Write-Host "  URL:              $(staticWebAppUrl)" -ForegroundColor White
          Write-Host ""
          Write-Host "Azure Portal:" -ForegroundColor Yellow
          Write-Host "  Resource Group:   $(resourceGroupName)" -ForegroundColor White
          Write-Host ""
          Write-Host "============================================================================" -ForegroundColor Green
