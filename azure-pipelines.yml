# ============================================================================
# DJOPPIE INVENTORY - SIMPLIFIED AZURE PIPELINE (LEARNING VERSION)
# ============================================================================
# This is a beginner-friendly pipeline focused on learning Azure DevOps
#
# What this pipeline does:
# 1. Builds your React frontend and .NET backend
# 2. Deploys infrastructure using Bicep templates
# 3. Deploys applications to Azure
# 4. Runs basic health checks
#
# Branch strategy:
# - 'develop' branch → deploys to DEV environment
# - 'main' branch → deploys to PROD environment
# ============================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'
      - 'infrastructure-simple/README.md'

# Don't run on pull requests (save build minutes)
pr: none

# Use Ubuntu (cheaper and faster than Windows)
pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES
# ============================================================================

variables:
  # Build settings
  buildConfiguration: 'Release'
  dotnetVersion: '8.x'
  nodeVersion: '20.x'

  # Project paths
  backendPath: 'src/backend'
  frontendPath: 'src/frontend'
  infrastructurePath: 'infrastructure-simple'

  # Determine environment based on branch
  ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    environment: 'prod'
    azureServiceConnection: 'Azure-Djoppie-Prod' # You'll create this service connection
    resourceGroupName: 'rg-djoppie-prod'
  ${{ else }}:
    environment: 'dev'
    azureServiceConnection: 'Azure-Djoppie-Dev' # You'll create this service connection
    resourceGroupName: 'rg-djoppie-dev'

# ============================================================================
# STAGES
# ============================================================================

stages:
# ----------------------------------------------------------------------------
# STAGE 1: BUILD
# ----------------------------------------------------------------------------
- stage: Build
  displayName: 'Build Applications'
  jobs:

  # Build Backend (.NET)
  - job: BuildBackend
    displayName: 'Build .NET API'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 8'
      inputs:
        packageType: 'sdk'
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Restore packages'
      inputs:
        command: 'restore'
        projects: '$(backendPath)/**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build backend'
      inputs:
        command: 'build'
        projects: '$(backendPath)/DjoppieInventory.API/DjoppieInventory.API.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish backend'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(backendPath)/DjoppieInventory.API/DjoppieInventory.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/backend'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      displayName: 'Save backend artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/backend'
        ArtifactName: 'backend'

  # Build Frontend (React)
  - job: BuildFrontend
    displayName: 'Build React App'
    steps:
    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd $(frontendPath)
        npm ci
      displayName: 'Install npm packages'

    - script: |
        cd $(frontendPath)
        npm run build
      displayName: 'Build React app'
      env:
        # These will be overwritten by Static Web App settings, but needed for build
        VITE_API_URL: 'https://placeholder-will-be-replaced.azurewebsites.net'
        VITE_ENTRA_CLIENT_ID: 'placeholder'
        VITE_ENTRA_TENANT_ID: 'placeholder'
        VITE_ENVIRONMENT: $(environment)

    - task: PublishBuildArtifacts@1
      displayName: 'Save frontend artifacts'
      inputs:
        PathtoPublish: '$(frontendPath)/dist'
        ArtifactName: 'frontend'

# ----------------------------------------------------------------------------
# STAGE 2: DEPLOY INFRASTRUCTURE
# ----------------------------------------------------------------------------
- stage: DeployInfrastructure
  displayName: 'Deploy Infrastructure'
  dependsOn: [] # Run in parallel with Build
  condition: ne(variables['Build.Reason'], 'PullRequest')
  jobs:
  - job: DeployBicep
    displayName: 'Deploy Bicep Templates'
    steps:
    - task: AzureCLI@2
      displayName: 'Create resource group'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Creating resource group: $(resourceGroupName)"
          az group create \
            --name $(resourceGroupName) \
            --location westeurope \
            --tags Environment=$(environment) Project=Djoppie-Inventory ManagedBy=AzureDevOps

    - task: AzureCLI@2
      displayName: 'Deploy infrastructure'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Deploying infrastructure to $(environment) environment..."

          # Deploy using Bicep
          az deployment group create \
            --name "djoppie-$(environment)-$(Build.BuildId)" \
            --resource-group $(resourceGroupName) \
            --template-file $(infrastructurePath)/main.bicep \
            --parameters $(infrastructurePath)/parameters/$(environment).bicepparam \
            --parameters entraBackendClientSecret='$(ENTRA_BACKEND_CLIENT_SECRET)' \
            --output json > deployment-output.json

          echo "Infrastructure deployed successfully!"

          # Save outputs for next stages
          cat deployment-output.json
      name: infraDeploy

    - task: AzureCLI@2
      displayName: 'Save deployment outputs'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Querying deployed resources in $(resourceGroupName)..."

          # Query resources directly from resource group (more reliable than deployment outputs)
          BACKEND_APP_NAME=$(az webapp list \
            --resource-group $(resourceGroupName) \
            --query "[?kind=='app,linux'].name | [0]" -o tsv)

          FRONTEND_APP_NAME=$(az staticwebapp list \
            --resource-group $(resourceGroupName) \
            --query "[0].name" -o tsv)

          KEY_VAULT_NAME=$(az keyvault list \
            --resource-group $(resourceGroupName) \
            --query "[0].name" -o tsv)

          # Validate we got the names
          if [ -z "$BACKEND_APP_NAME" ]; then
            echo "ERROR: Could not find backend app service"
            exit 1
          fi

          if [ -z "$FRONTEND_APP_NAME" ]; then
            echo "ERROR: Could not find frontend static web app"
            exit 1
          fi

          # Save as pipeline variables for next stages
          echo "##vso[task.setvariable variable=backendAppName;isOutput=true]$BACKEND_APP_NAME"
          echo "##vso[task.setvariable variable=frontendAppName;isOutput=true]$FRONTEND_APP_NAME"
          echo "##vso[task.setvariable variable=keyVaultName;isOutput=true]$KEY_VAULT_NAME"

          echo "✓ Backend App: $BACKEND_APP_NAME"
          echo "✓ Frontend App: $FRONTEND_APP_NAME"
          echo "✓ Key Vault: $KEY_VAULT_NAME"
      name: outputs

# ----------------------------------------------------------------------------
# STAGE 3: DEPLOY APPLICATIONS
# ----------------------------------------------------------------------------
- stage: DeployApplications
  displayName: 'Deploy Applications'
  dependsOn:
    - Build
    - DeployInfrastructure
  condition: succeeded()
  variables:
    backendAppName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.backendAppName'] ]
    frontendAppName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.frontendAppName'] ]
  jobs:

  # Deploy Backend
  - deployment: DeployBackend
    displayName: 'Deploy Backend API'
    environment: 'djoppie-$(environment)-backend'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            displayName: 'Download backend build'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'backend'
              downloadPath: '$(Pipeline.Workspace)'

          - task: AzureWebApp@1
            displayName: 'Deploy to App Service'
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: 'webAppLinux'
              appName: $(backendAppName)
              package: '$(Pipeline.Workspace)/backend/*.zip'
              runtimeStack: 'DOTNETCORE|8.0'

          - task: AzureCLI@2
            displayName: 'Wait for app to start'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Waiting 30 seconds for app to start..."
                sleep 30

                echo "Checking health endpoint..."
                APP_URL="https://$(backendAppName).azurewebsites.net/health"

                for i in {1..5}; do
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" $APP_URL)
                  if [ $STATUS -eq 200 ]; then
                    echo "✓ Backend is healthy (HTTP $STATUS)"
                    exit 0
                  fi
                  echo "Attempt $i/5: HTTP $STATUS - waiting..."
                  sleep 10
                done

                echo "⚠ Health check inconclusive, but continuing deployment"

  # Deploy Frontend
  - deployment: DeployFrontend
    displayName: 'Deploy Frontend App'
    environment: 'djoppie-$(environment)-frontend'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            displayName: 'Download frontend build'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'frontend'
              downloadPath: '$(Pipeline.Workspace)'

          - task: AzureCLI@2
            displayName: 'Get deployment token'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                TOKEN=$(az staticwebapp secrets list \
                  --name $(frontendAppName) \
                  --resource-group $(resourceGroupName) \
                  --query "properties.apiKey" -o tsv)

                echo "##vso[task.setvariable variable=STATIC_WEB_APP_TOKEN;issecret=true]$TOKEN"

          - task: AzureStaticWebApp@0
            displayName: 'Deploy to Static Web App'
            inputs:
              app_location: '$(Pipeline.Workspace)/frontend'
              output_location: ''
              azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)
              skip_app_build: true

# ----------------------------------------------------------------------------
# STAGE 4: SMOKE TESTS
# ----------------------------------------------------------------------------
- stage: SmokeTests
  displayName: 'Smoke Tests'
  dependsOn: DeployApplications
  condition: succeeded()
  variables:
    backendAppName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.backendAppName'] ]
    frontendAppName: $[ stageDependencies.DeployInfrastructure.DeployBicep.outputs['outputs.frontendAppName'] ]
  jobs:
  - job: TestEndpoints
    displayName: 'Test Endpoints'
    steps:
    - task: AzureCLI@2
      displayName: 'Test backend API'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Testing backend API..."

          BACKEND_URL="https://$(backendAppName).azurewebsites.net"

          # Test health endpoint
          echo "Testing /health..."
          curl -f "$BACKEND_URL/health" || echo "Health check returned non-200"

          # Test Swagger UI
          echo "Testing /swagger..."
          curl -f "$BACKEND_URL/swagger" || echo "Swagger returned non-200"

          echo "Backend tests complete"

    - task: AzureCLI@2
      displayName: 'Test frontend app'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Testing frontend app..."

          FRONTEND_URL="https://$(frontendAppName).azurestaticapps.net"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL)

          if [ $STATUS -eq 200 ]; then
            echo "✓ Frontend is accessible (HTTP $STATUS)"
          else
            echo "⚠ Frontend returned HTTP $STATUS"
          fi

          echo ""
          echo "========================================="
          echo "DEPLOYMENT COMPLETE!"
          echo "========================================="
          echo "Backend API: $BACKEND_URL"
          echo "Frontend App: $FRONTEND_URL"
          echo "Environment: $(environment)"
          echo "========================================="
